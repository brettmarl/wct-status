name: Sync legacy official notices

on:
  push:
    branches:
      - main
    paths:
      - trail-status.json
      - scripts/sync-official-notices.mjs

  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository files
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6c
        with:
          node-version: 24
          package-manager-cache: false

      - name: Rebuild official_notices.json
        run: node scripts/sync-official-notices.mjs

      - name: Commit regenerated file if needed
        run: |
          if git diff --quiet -- official_notices.json; then
            echo "official_notices.json is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add official_notices.json
          git commit -m "chore: sync official notices from trail status"
          git push
